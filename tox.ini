[tox]
skipsdist=true
envlist = py{310,311,312},flake8

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312

[testenv]
dependency_groups = dev
commands =
    pytest --cov-report term --cov=capgains tests/

[testenv:flake8]
dependency_groups = dev
commands =
    flake8 capgains tests
